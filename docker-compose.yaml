services:
  ui:
    build:
      context: .
      dockerfile: build/Dockerfile.ui
    container_name: UI
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  replay-engine:
    build:
      context: .
      dockerfile: build/Dockerfile.replay-engine
    container_name: replay-engine
    ports:
      - "8000:8000"
    environment:
      # gates wizard step "4 · 3D Reconstruction"; flip to false for the
      # judged submission if reconstruction-svc ends up unstaffed
      - RECONSTRUCTION_UPLOAD_ENABLED=true
      # set to the MI300X service URL when it exists, e.g. http://<host>:9000
      # - RECONSTRUCTION_SVC_URL=
    volumes:
      # Seeded from the baked demo data on first creation; matches added
      # via POST /matches persist here across restarts.
      - replay-data:/svc/app/data
    restart: unless-stopped

volumes:
  replay-data:
